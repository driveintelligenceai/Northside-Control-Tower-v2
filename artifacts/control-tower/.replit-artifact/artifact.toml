kind = "web"
previewPath = "/"
title = "Northside Control Tower"
version = "1.0.0"
id = "artifacts/control-tower"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23096

[services.development]
run = "pnpm --filter @workspace/control-tower run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/control-tower", "run", "build" ]
publicDir = "artifacts/control-tower/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23096"
BASE_PATH = "/"
